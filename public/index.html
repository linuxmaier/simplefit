<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Exercise Tracker</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/style.css">
  <!-- Google Identity Services (loaded async; Drive features require sign-in) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div id="app">
    <header>
      <h1 id="page-title">Workout</h1>
    </header>

    <main id="main">
      <div class="empty">Loading…</div>
    </main>

    <nav id="nav"></nav>
  </div>

  <!-- Modal -->
  <div class="modal-backdrop hidden" id="modal-backdrop" onclick="app.closeModal()">
    <div class="modal" id="modal" onclick="event.stopPropagation()"></div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <script type="module" src="/app.js"></script>
</body>
</html>
