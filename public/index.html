<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>SimpleFit</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="style.css">
  <!-- Google Identity Services (loaded async; Drive features require sign-in) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <!-- Lucide icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <div id="app">
    <header>
      <div class="segmented-control" id="mode-switcher" role="tablist"></div>
      <div class="header-icons">
        <span class="header-cloud" id="header-cloud"></span>
        <button class="theme-toggle" id="theme-toggle" onclick="app.toggleTheme()"></button>
      </div>
    </header>

    <main id="main">
      <div class="empty">Loading…</div>
    </main>

    <nav id="nav"></nav>
  </div>

  <!-- Modal -->
  <div class="modal-backdrop hidden" id="modal-backdrop" onclick="app.closeModal()">
    <div class="modal" id="modal" onclick="event.stopPropagation()"></div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
